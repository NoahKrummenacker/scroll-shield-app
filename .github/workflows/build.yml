name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Kotlin APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Build Flutter APK
        run: |
          cd flutter_ui
          flutter pub get
          flutter build apk --release

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          git tag -f latest
          git push origin latest --force
          gh release create latest \
            --title "Latest Build" \
            --notes "APK compilé automatiquement depuis le dernier commit sur main." \
            --prerelease \
            app/build/outputs/apk/debug/app-debug.apk#ScrollShield-Kotlin.apk \
            flutter_ui/build/app/outputs/flutter-apk/app-release.apk#ScrollShield-Flutter.apk
